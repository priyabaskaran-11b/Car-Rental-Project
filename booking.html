
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gabarito:wght@400..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins&family=Racing+Sans+One&display=swap" rel="stylesheet">
</head>
<body style="font-family: 'Montserrat', sans-serif;">
  
    <header class="bg-green-900 text-white p-3 flex justify-between items-center sticky top-0 z-10 shadow-xl "> 
        <h1 class="text-3xl font-bold">Drive Now </h1>
        <svg id="menuicon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
            class="size-6 md:hidden w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
        </svg>
        <nav class="flex items-center space-x-4 hidden md:flex">
            <a href="#" class="text-lg hover:text-gray-300">Home</a>
            <a href="#" class="text-lg hover:text-gray-300">About</a>
            <a href="#" class="text-lg hover:text-gray-300">Contact</a>
        </nav>
    </header>
    <div id="sidenav" class="bg-green-900 fixed z-20 top-0 transition-all duration-1000" style="width: 50%; height: 100vh; right: inherit;top: -100%; right: 0;">
        <div class="text-right p-5">
            <p id="close-nav" class=" text-white inline cursor-pointer">X</p>
        </div>
        <nav class=" text-white flex flex-col gap-10 items-center space-x-4">
            <a href="#" class="text-lg hover:text-gray-300">Home</a>
            <a href="#" class="text-lg hover:text-gray-300">About</a>
            <a href="#" class="text-lg hover:text-gray-300">Contact</a>
        </nav>
    </div>
    
    
    <main class="container mx-auto p-4 mt-4">
        
        <section class="bg-white shadow-md p-4 mb-4 border border-green-500 rounded">
            <h2 class="text-2xl font-bold mb-4">Search for a Car</h2>
           
            <form>
               
                <div class="flex flex-wrap -mx-3 mb-2">
                    
                    <div class="w-full md:w-1/3 px-3 mb-6 md:mb-0">
                        <label for="pickup-location" class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2" >
                            Pickup Location
                        </label>
                        <input type="text" id="pickup-location" class="appearance-none block w-full bg-gray-200 text-gray-700 border border-gray-200 rounded py-3 px-4 mb-3 leading-tight focus:outline-none focus:bg-white focus:border-gray-500" placeholder="Enter pickup location">
                    </div>
                   
                    <div class="w-full md:w-1/3 px-3 mb-6 md:mb-0">
                        <label for="dropoff-location" class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2" >
                            Dropoff Location
                        </label>
                        <input type="text" id="dropoff-location" class="appearance-none block w-full bg-gray-200 text-gray-700 border border-gray-200 rounded py-3 px-4 mb-3 leading-tight focus:outline-none focus:bg-white focus:border-gray-500" placeholder="Enter dropoff location">
                    </div>
                    
                    <div class="w-full md:w-1/3 px-3 mb-6 md:mb-0">
                        <label for="pickup-date" class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2" >
                            Pickup Date
                        </label>
                        <input type="date" id="pickup-date" class="appearance-none block w-full bg-gray-200 text-gray-700 border border-gray-200 rounded py-3 px-4 mb-3 leading-tight focus:outline-none focus:bg-white focus:border-gray-500"  placeholder="Enter pickup date">
                    </div>
                
                </div>
                
                <div class="flex flex-wrap -mx-3 mb-2">
                    
                    <div class="w-full md:w-1/3 px-3 mb-6 md:mb-0">
                        <label for="dropoff-date" class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2" >
                            Dropoff Date
                        </label>
                        <input type="date" id="dropoff-date" class="appearance-none block w-full bg-gray-200 text-gray-700 border border-gray-200 rounded py-3 px-4 mb-3 leading-tight focus:outline-none focus:bg-white focus:border-gray-500" placeholder="Enter dropoff date">
                    </div>
                    
                    <div class="w-full md:w-1/3 px-3 mb-6 md:mb-0">
                        <label for="car-type" class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2" >
                            Car Type
                        </label>
                        <select id="car-type" class="appearance-none block w-full bg-gray-200 text-gray-700 border border-gray-200 rounded py-3 px-4 mb-3 leading-tight focus:outline-none focus:bg-white focus:border-gray-500">
                            <option value="">Select Car Type</option>
                            <option value="economy">Economy</option>
                            <option value="compact">Compact</option>
                            <option value="intermediate">Intermediate</option>
                            <option value="standard">Standard</option>
                            <option value="full-size">Full Size</option>
                            <option value="luxury">Luxury</option>
                        </select>
                    </div>
                    
                    <div class="w-full md:w-1/3 px-3 mb-6 md:mb-0">
                        <button   class="bg-green-900 hover:bg-green-700 text-white font-bold py-2 px-4 rounded flex items-center justify-center mt-5 mx-auto w-full" type="submit">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                            </svg>
                            Search
                        </button>
                        <p id="dateerror" class="text-red-500 text-sm hidden">Dropoff date cannot be earlier than pickup date.</p>
                    </div>
                
                </div>
            
            </form>
       
        </section>
        
        <section class="bg-white shadow-md p-4 mb-4 border border-green-500 rounded">
            <h2 class="text-2xl font-bold mb-4">Available Cars</h2>
           
            <div class="flex flex-wrap -mx-3 mb-2">
                
                <div class="w-full  md:w-1/3 px-3 mb-6 md:mb-0 flex items-center justify-center">
                    
                    <div class="bg-gray-200 p-4 border border-gray-200 rounded">
                        <h3 class="text-lg font-bold mb-2">Economy Car</h3>
                        <p class="text-gray-600">Toyota Corolla</p>
                        <p class="text-gray-600">$40/day</p>
                        <button id="btn1" class="bg-green-900 hover:bg-green-700 text-white font-bold py-2 px-4 rounded" type="button">Book Now</button>
                    </div>
                    <div>
                        <img src="./img/car2.png" alt="Car Image" class="w-full h-40 object-cover  -mx-1 rounded bg-gray-200 " >
                    </div>
                    
                </div>
                <div class="w-full md:w-1/3 px-3 mb-6 md:mb-0 flex items-center justify-center">
                    <div class="bg-gray-200 p-4 border border-gray-200 rounded">
                        <h3 class="text-lg font-bold mb-2">Compact Car</h3>
                        <p class="text-gray-600">Honda Civic</p>
                        <p class="text-gray-600">$50/day</p>
                        <button id="btn2" class="bg-green-900 hover:bg-green-700 text-white font-bold py-2 px-4 rounded" type="button">Book Now</button>
                    </div>
                    <div>
                        <img src="./img/car3.png" alt="Car Image" class="w-full h-40 object-cover  -mx-1 rounded bg-gray-200 " >
                    </div>
                </div>
                
                <div class="w-full md:w-1/3 px-3 mb-6 md:mb-0 flex items-center justify-center">
                    <div class="bg-gray-200 p-4 border border-gray-200 rounded">
                        <h3 class="text-lg font-bold mb-2">Intermediate Car</h3>
                        <p class="text-gray-600">Toyota Camry</p>
                        <p class="text-gray-600">$60/day</p>
                        <button id="btn3" class="bg-green-900 hover:bg-green-700 text-white font-bold py-2 px-4 rounded" type="button">Book Now</button>
                    </div>
                    
                    <div>
                        <img src="./img/car5.png" alt="Car Image" class="w-full h-40 object-cover  -mx-1 rounded bg-gray-200 " >
                    </div>
               
                </div>
            </div>
            </section>
            <div>
                <img src="./img/car1.jpg" alt="Car Image" class="w-full h-42 object-cover rounded " >
            </div>
    </main>

    
    <footer class="bg-green-900 text-white p-4 text-center">
        <p>&copy; 2026 Drive Now</p>
    </footer>
    <script src="booking.js"></script>
</body>
</html>
