<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>DriveNow - Car Details</title>

    <!-- GOOGLE FONT -->

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
    href="viewdetails.css">

</head>

<body>


    <!-- ================= HEADER ================= -->

    <header class="details-header">

        <div class="logo">

            <i class="fa-solid fa-car-side"></i>

            <h2>DriveNow</h2>

        </div>


        <!-- BACK BUTTON -->

        <a href="browsecars.html"
        class="back-btn">

            <i class="fa-solid fa-arrow-left"></i>

            Back

        </a>

    </header>



    <!-- ================= MAIN ================= -->

    <main class="details-container">


        <!-- CAR IMAGE -->

        <div class="details-image">

            <img id="carImage"
            src=""
            alt="Car Image">

        </div>



        <!-- DETAILS CONTENT -->

        <div class="details-content">


            <!-- CAR TYPE -->

            <span class="car-type"
            id="carType">

            </span>


            <!-- CAR NAME -->

            <h1 id="carName">

                Car Name

            </h1>


            <!-- RATING -->

            <div class="rating">

                <i class="fa-solid fa-star"></i>

                <span id="carRating">

                </span>

            </div>


            <!-- PRICE -->

            <div class="price">

                $<span id="carPrice">

                </span>

                <small>/day</small>

            </div>



            <!-- DETAILS GRID -->

            <div class="details-grid">


                <!-- SEATS -->

                <div class="detail-card">

                    <i class="fa-solid fa-user-group"></i>

                    <h3 id="carSeats">

                    </h3>

                    <p>Seats</p>

                </div>


                <!-- TRANSMISSION -->

                <div class="detail-card">

                    <i class="fa-solid fa-gauge"></i>

                    <h3 id="carTransmission">

                    </h3>

                    <p>Transmission</p>

                </div>


                <!-- FUEL -->

                <div class="detail-card">

                    <i class="fa-solid fa-gas-pump"></i>

                    <h3 id="carFuel">

                    </h3>

                    <p>Fuel Type</p>

                </div>

            </div>



            <!-- FEATURES -->

            <div class="features">

                <h2>

                    Features

                </h2>

                <ul>

                    <li>✔ Premium Interior</li>

                    <li>✔ GPS Navigation</li>

                    <li>✔ Reverse Camera</li>

                    <li>✔ Bluetooth Audio</li>

                    <li>✔ Climate Control</li>

                    <li>✔ Luxury Comfort</li>

                </ul>

            </div>



            <!-- BOOKING SECTION -->

            <div class="booking-section">

                <h2>

                    Reserve This Car

                </h2>

                <input type="text"
                placeholder="Your Name">

                <input type="date">

                <button class="book-btn">

                    Book Now

                </button>

            </div>

        </div>

    </main>



    <!-- ================= FOOTER ================= -->

    <footer class="details-footer">

        <p>

            © 2026 DriveNow.
            All Rights Reserved.

        </p>

    </footer>



    <!-- JAVASCRIPT -->

    <script src="viewdetails.js"></script>

</body>

</html>
